<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">From entropy to regeneration flow</title>
  <desc id="desc">A flow from four failure mechanisms to coordination tax and then to RSA plus ALMA regenerative response.</desc>
