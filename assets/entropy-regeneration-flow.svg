      <stop offset="0%" stop-color="#f6f5f1"/>
      <stop offset="100%" stop-color="#e9efe9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4e5a60"/>
    </marker>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)" rx="28"/>

  <rect x="36" y="54" width="240" height="72" rx="14" fill="#fff" stroke="#c7ccd0"/>
  <text x="56" y="93" font-size="24" fill="#1e2226" font-family="Arial, sans-serif">Narrative exclusion</text>

  <rect x="36" y="142" width="240" height="72" rx="14" fill="#fff" stroke="#c7ccd0"/>
  <text x="56" y="181" font-size="24" fill="#1e2226" font-family="Arial, sans-serif">Institutional fragility</text>

  <rect x="36" y="230" width="240" height="72" rx="14" fill="#fff" stroke="#c7ccd0"/>
  <text x="56" y="269" font-size="24" fill="#1e2226" font-family="Arial, sans-serif">Market opacity</text>

  <rect x="36" y="318" width="240" height="72" rx="14" fill="#fff" stroke="#c7ccd0"/>
  <text x="56" y="357" font-size="24" fill="#1e2226" font-family="Arial, sans-serif">Fragmented governance</text>

