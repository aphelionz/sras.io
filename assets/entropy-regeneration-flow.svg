  <rect x="912" y="226" width="250" height="110" rx="16" fill="#e5ebf6" stroke="#7290c5"/>
  <text x="942" y="274" font-size="28" fill="#1f3f71" font-family="Arial, sans-serif">ALMA</text>
  <text x="942" y="304" font-size="20" fill="#365986" font-family="Arial, sans-serif">Polycentric adoption</text>

  <text x="36" y="36" font-size="20" fill="#5a6369" font-family="Arial, sans-serif">Structural drift</text>
  <text x="912" y="36" font-size="20" fill="#5a6369" font-family="Arial, sans-serif">Regenerative architecture</text>
