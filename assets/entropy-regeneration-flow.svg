  <rect x="488" y="140" width="250" height="140" rx="18" fill="#ffffff" stroke="#b9c2c8" stroke-width="2"/>
  <text x="518" y="190" font-size="26" fill="#182022" font-family="Arial, sans-serif">Coordination Tax</text>
  <text x="518" y="228" font-size="20" fill="#5a6369" font-family="Arial, sans-serif">Verification resets</text>

  <path d="M752 210 H892" stroke="#4e5a60" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="912" y="84" width="250" height="110" rx="16" fill="#dceee9" stroke="#67a99f"/>
  <text x="942" y="132" font-size="28" fill="#0f4f48" font-family="Arial, sans-serif">RSA</text>
